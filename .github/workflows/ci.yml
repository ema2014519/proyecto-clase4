name: CI Pipeline

on:
  push:
    branches:
      - main

env:
  APP_NAME: cron-ticker
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Show Variables
        run: echo "App: ${{ env.APP_NAME }}, Node: ${{ env.NODE_VERSION }}"

      - name: Build
        run: node scripts/build.js
