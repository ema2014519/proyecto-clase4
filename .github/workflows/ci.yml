name: CI Pipeline

on:
  push:
    branches:
      - main

env:
  APP_NAME: cron-ticker
  NODE_VERSION: 20

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

  # ======== JOB 3: BUILD ========
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build
        run: npm run build
        env:
          APP_VERSION: '2.0.0'
